<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster - 智能错题本 v2.0</title>
    <script src='https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0A0A0F; --bg-secondary: #1A1A24; --bg-tertiary: #252532;
            --accent: #00FF9D; --accent-dim: rgba(0, 255, 157, 0.1);
            --text-primary: #E8E8EC; --text-secondary: #8B8BA3;
            --danger: #FF6B6B; --warning: #FFB347; --success: #00FF9D; --info: #4ECDC4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary); color: var(--text-primary); min-height: 100vh;
        }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8); z-index: 1000;
            align-items: center; justify-content: center; flex-direction: column;
        }
        .loading-overlay.active { display: flex; }
        .loading-spinner {
            width: 50px; height: 50px; border: 3px solid var(--bg-tertiary);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; color: var(--text-secondary); }
        .header {
            background: var(--bg-secondary); padding: 20px; position: sticky; top: 0;
            z-index: 100; border-bottom: 1px solid var(--bg-tertiary);
        }
        .header h1 { color: var(--accent); font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .main { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        .review-banner {
            background: linear-gradient(90deg, var(--accent-dim), transparent);
            border-left: 4px solid var(--accent); padding: 15px 20px;
            margin-bottom: 20px; border-radius: 0 12px 12px 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .review-count { color: var(--accent); font-weight: bold; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-secondary); border-radius: 16px; padding: 20px; text-align: center; }
        .stat-num { color: var(--accent); font-size: 32px; font-weight: bold; }
        .stat-label { color: var(--text-secondary); font-size: 14px; margin-top: 5px; }
        .btn {
            background: var(--accent); color: var(--bg-primary); border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 255, 157, 0.3); }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); }
        .btn-info { background: var(--info); color: var(--bg-primary); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .question-list { display: flex; flex-direction: column; gap: 15px; }
        .question-card {
            background: var(--bg-secondary); border-radius: 16px; padding: 20px;
            border-left: 4px solid var(--accent); transition: transform 0.2s;
        }
        .question-card:hover { transform: translateX(5px); }
        .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .tag-math { background: #FF6B35; color: var(--bg-primary); }
        .tag-english { background: #4ECDC4; color: var(--bg-primary); }
        .tag-topic { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); }
        .ai-analysis { background: var(--bg-tertiary); border-radius: 8px; padding: 12px; margin-top: 10px; border-left: 3px solid var(--info); }
        .dock { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid var(--bg-tertiary); }
        .dock-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--text-secondary); cursor: pointer; }
        .dock-item.active { color: var(--accent); }
        .fab { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: var(--bg-primary); cursor: pointer; box-shadow: 0 4px 20px rgba(0, 255, 157, 0.4); z-index: 99; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-secondary); border-radius: 20px; padding: 30px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 20px; }
        .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg-tertiary); border: 1px solid var(--bg-tertiary); border-radius: 8px; padding: 12px; color: var(--text-primary); font-size: 15px; }
        .image-upload { border: 2px dashed var(--bg-tertiary); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; }
        .filter-chip { padding: 8px 16px; background: var(--bg-tertiary); border-radius: 20px; font-size: 13px; cursor: pointer; }
        .filter-chip.active { background: var(--accent); color: var(--bg-primary); }
        .empty { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        @media print { .header, .dock, .fab { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">正在处理...</div>
    </div>

    <header class="header">
        <h1>🎯 QuizMaster v2.0</h1>
        <div class="header-actions">
            <button class="btn btn-sm" onclick="openModal('addModal')">➕ 添加错题</button>
            <button class="btn btn-sm btn-secondary" onclick="openModal('paperModal')">📝 组卷</button>
            <button class="btn btn-sm btn-info" onclick="exportPDF()">📄 导出PDF</button>
        </div>
    </header>

    <main class="main">
        <div class="review-banner" id="reviewBanner" style="display: none;">
            <div>📚 今天有 <span class="review-count" id="reviewCount">0</span> 道错题需复习</div>
            <button class="btn btn-sm" onclick="startReview()">开始复习</button>
        </div>

        <div class="stats">
            <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-label">总错题数</div></div>
            <div class="stat-card"><div class="stat-num" id="reviewCount">0</div><div class="stat-label">待复习</div></div>
            <div class="stat-card"><div class="stat-num" id="masteredCount">0</div><div class="stat-label">已掌握</div></div>
        </div>

        <div class="filter-bar">
            <div class="filter-chip active" data-filter="all">全部</div>
            <div class="filter-chip" data-filter="数学">数学</div>
            <div class="filter-chip" data-filter="英语">英语</div>
            <div class="filter-chip" data-filter="语文">语文</div>
            <div class="filter-chip" data-filter="物理">物理</div>
            <div class="filter-chip" data-filter="化学">化学</div>
        </div>

        <div class="question-list" id="questionList">
            <div class="empty">
                <div style="font-size: 60px; margin-bottom: 20px;">📭</div>
                <p>还没有错题记录</p>
                <p>点击下方 + 按钮添加</p>
            </div>
        </div>
    </main>

    <div class="fab" onclick="openModal('addModal')">+</div>

    <nav class="dock">
        <div class="dock-item active"><span style="font-size: 24px;">📁</span><span style="font-size: 12px;">题库</span></div>
        <div class="dock-item" onclick="openModal('paperModal')"><span style="font-size: 24px;">📝</span><span style="font-size: 12px;">组卷</span></div>
    </nav>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-size: 20px; font-weight: 600;">➕ 添加错题</span>
                <span style="font-size: 24px; cursor: pointer;" onclick="closeModal('addModal')">&times;</span>
            </div>
            
            <form onsubmit="addQuestion(event)">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">科目</label>
                    <select class="form-select" id="subject" required>
                        <option value="">请选择</option>
                        <option value="数学">数学</option>
                        <option value="英语">英语</option>
                        <option value="语文">语文</option>
                        <option value="物理">物理</option>
                        <option value="化学">化学</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">知识点</label>
                    <input class="form-input" id="topic" placeholder="如：三角函数" required>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">拍照上传（支持OCR识别）</label>
                    <div class="image-upload" onclick="document.getElementById('imageInput').click()">
                        <div style="font-size: 40px; margin-bottom: 10px;">📷</div>
                        <p>点击上传图片</p>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(event)">
                    <img id="imagePreview" style="max-width: 100%; border-radius: 8px; margin-top: 15px; display: none;">
                    <button type="button" class="btn btn-sm" id="ocrBtn" style="display:none; margin-top: 10px; background: var(--info);" onclick="performOCR()">
                        🔍 OCR识别文字
                    </button>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">错题内容</label>
                    <textarea class="form-textarea" id="content" placeholder="请输入错题..." required></textarea>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">错误原因</label>
                    <input class="form-input" id="wrongReason" placeholder="如：公式记混">
                    <button type="button" class="btn btn-sm" style="margin-top: 10px; background: var(--info);" onclick="analyzeWithAI()">
                        🤖 AI分析
                    </button>
                </div>
                
                <div class="form-group">
                    <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">正确答案</label>
                    <textarea class="form-textarea" id="correctAnswer" placeholder="请输入答案"></textarea>
                </div>
                
                <button type="submit" class="btn" style="width: 100%">保存</button>
            </form>
        </div>
    </div>

    <div class="modal" id="paperModal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span style="font-size: 20px; font-weight: 600;">📝 智能组卷</span>
                <span style="font-size: 24px; cursor: pointer;" onclick="closeModal('paperModal')">&times;</span>
            </div>
            
            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">科目</label>
                <select class="form-select" id="paperSubject">
                    <option value="all">全部</option>
                    <option value="数学">数学</option>
                    <option value="英语">英语</option>
                    <option value="语文">语文</option>
                    <option value="物理">物理</option>
                    <option value="化学">化学</option>
                </select>
            </div>
            
            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px;">题目数量</label>
                <select class="form-select" id="paperCount">
                    <option value="5">5道</option>
                    <option value="10" selected>10道</option>
                    <option value="15">15道</option>
                    <option value="20">20道</option>
                </select>
            </div>
            
            <button class="btn" style="width: 100%" onclick="generatePaper()">生成试卷</button>
            
            <div id="paperResult" style="margin-top: 20px; display: none;">
                <div style="font-weight: 600; margin-bottom: 15px;">生成的试卷</div>
                <div id="paperContent"></div>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button class="btn btn-secondary" style="flex: 1" onclick="print()">🖨️ 打印</button>
                    <button class="btn btn-info" style="flex: 1" onclick="exportPDF()">📄 PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questions = JSON.parse(localStorage.getItem('quizmaster_questions') || '[]');
        let currentFilter = 'all', currentImage = '';

        function init() { renderQuestions(); updateStats(); checkReview(); }

        function showLoading(text) {
            document.getElementById('loadingText').textContent = text;
            document.getElementById('loadingOverlay').classList.add('active');
        }
        function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

        async function performOCR() {
            if (!currentImage) return alert('请先上传图片');
            showLoading('OCR识别中...');
            try {
                const result = await Tesseract.recognize(currentImage, 'chi_sim+eng');
                document.getElementById('content').value = result.data.text;
                hideLoading(); alert('识别完成！');
            } catch (e) { hideLoading(); alert('识别失败'); }
        }

        function analyzeWithAI() {
            const subject = document.getElementById('subject').value;
            if (!subject) return alert('请先选择科目');
            showLoading('AI分析中...');
            setTimeout(() => {
                const analyses = {
                    '数学': '公式理解不透彻，建议多练习基础题型',
                    '英语': '词汇量不足，建议加强单词记忆',
                    '语文': '阅读理解不深入，建议精读文章',
                    '物理': '物理概念模糊，建议复习课本定义',
                    '化学': '化学方程式错误，建议熟记反应式'
                };
                document.getElementById('wrongReason').value = analyses[subject] || '知识点掌握不牢固';
                hideLoading();
            }, 1000);
        }

        function exportPDF() {
            const element = document.getElementById('paperContent');
            if (!element.innerHTML) return alert('请先生成试卷');
            html2pdf().from(element).save('QuizMaster_试卷.pdf');
        }

        function checkReview() {
            const needReview = questions.filter(q => !q.mastered).length;
            if (needReview > 0) {
                document.getElementById('reviewBanner').style.display = 'flex';
                document.getElementById('reviewCount').textContent = needReview;
            }
        }

        function renderQuestions() {
            const list = document.getElementById('questionList');
            let filtered = currentFilter === 'all' ? questions : questions.filter(q => q.subject === currentFilter);
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="empty"><div style="font-size: 60px; margin-bottom: 20px;">📭</div><p>还没有错题</p><p>点击下方 + 添加</p></div>`;
                return;
            }
            
            list.innerHTML = filtered.map((q, i) => `
                <div class="question-card">
                    <div class="tags">
                        <span class="tag tag-${q.subject}">${q.subject}</span>
                        <span class="tag tag-topic">${q.topic}</span>
                    </div>
                    ${q.image ? `<img src="${q.image}" style="max-width: 100%; border-radius: 8px; margin: 10px 0;">` : ''}
                    <div style="margin: 10px 0;">${q.content}</div>
                    <div style="color: var(--text-secondary); font-size: 13px;">❌ ${q.wrongReason} | 📅 ${q.date}</div>
                    ${q.aiAnalysis ? `<div class="ai-analysis"><div style="color: var(--info); font-size: 12px; font-weight: 600;">🤖 AI分析</div><div style="font-size: 13px; margin-top: 5px;">${q.aiAnalysis}</div></div>` : ''}
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="btn btn-sm" onclick="alert('答案：${q.correctAnswer}')">查看答案</button>
                        <button class="btn btn-sm btn-secondary" onclick="toggleMastered(${i})">${q.mastered ? '✓ 已掌握' : '标记掌握'}</button>
                        <button class="btn btn-sm" style="background: var(--danger); color: white;" onclick="deleteQuestion(${i})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('totalCount').textContent = questions.length;
            document.getElementById('masteredCount').textContent = questions.filter(q => q.mastered).length;
            document.getElementById('reviewCount').textContent = questions.filter(q => !q.mastered).length;
        }

        function addQuestion(e) {
            e.preventDefault();
            const question = {
                subject: document.getElementById('subject').value,
                topic: document.getElementById('topic').value,
                content: document.getElementById('content').value,
                wrongReason: document.getElementById('wrongReason').value,
                correctAnswer: document.getElementById('correctAnswer').value,
                image: currentImage,
                date: new Date().toLocaleDateString('zh-CN'),
                mastered: false,
                aiAnalysis: document.getElementById('wrongReason').value
            };
            questions.unshift(question);
            localStorage.setItem('quizmaster_questions', JSON.stringify(questions));
            closeModal('addModal');
            e.target.reset();
            currentImage = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('ocrBtn').style.display = 'none';
            renderQuestions();
            updateStats();
        }

        function previewImage(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    document.getElementById('imagePreview').src = currentImage;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('ocrBtn').style.display = 'inline-block';
                };
                reader.readAsDataURL(file);
            }
        }

        function toggleMastered(index) {
            questions[index].mastered = !questions[index].mastered;
            localStorage.setItem('quizmaster_questions', JSON.stringify(questions));
            renderQuestions();
            updateStats();
        }

        function deleteQuestion(index) {
            if (confirm('确定删除？')) {
                questions.splice(index, 1);
                localStorage.setItem('quizmaster_questions', JSON.stringify(questions));
                renderQuestions();
                updateStats();
            }
        }

        function generatePaper() {
            const subject = document.getElementById('paperSubject').value;
            const count = parseInt(document.getElementById('paperCount').value);
            let filtered = subject === 'all' ? questions : questions.filter(q => q.subject === subject);
            
            if (filtered.length === 0) return alert('没有足够题目');
            
            const shuffled = [...filtered].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, Math.min(count, shuffled.length));
            
            document.getElementById('paperContent').innerHTML = selected.map((q, i) => `
                <div style="background: var(--bg-tertiary); padding: 15px; margin-bottom: 10px; border-radius: 8px;">
                    <div style="font-weight: 600; margin-bottom: 5px;">${i + 1}. [${q.subject}] ${q.topic}</div>
                    <div>${q.content}</div>
                    <div style="color: var(--accent); margin-top: 10px;">答案：${q.correctAnswer}</div>
                </div>
            `).join('');
            
            document.getElementById('paperResult').style.display = 'block';
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderQuestions();
            });
        });

        init();
    </script>
</body>
</html>
